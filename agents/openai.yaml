interface:
  display_name: "Install Mint"
  short_description: "Install or update Mint so the `mint` command is available. Use when a workflow depends on Mint and `which mint` fails, or when a user asks to install, reinstall, refresh, or update Mint."
  icon_small: "./assets/install-mint-icon.svg"
  icon_large: "./assets/install-mint-icon.png"
  brand_color: "#1A1A1A"
  default_prompt: "Use $install-mint to install or update Mint so the mint command is available."
